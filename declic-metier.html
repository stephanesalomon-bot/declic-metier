<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Déclic Métier</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --purple:#6C63FF;--pink:#FF6B9D;--dark:#1a1a2e;
    --card-r:18px;--shadow:0 8px 32px rgba(0,0,0,.35)
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--dark);color:#fff;
    min-height:100vh;overflow-x:hidden
  }

  /* ── Écrans ── */
  .screen{display:none;min-height:100vh;flex-direction:column;animation:fadeIn .4s ease}
  .screen.active{display:flex}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  /* ── Gradients de fond ── */
  #screen-welcome{background:linear-gradient(145deg,#6C63FF 0%,#3F3D56 55%,#1a1a2e 100%)}
  #screen-quiz   {background:linear-gradient(160deg,var(--quizTop,#6C63FF) 0%,#1a1a2e 100%)}
  #screen-results{background:linear-gradient(160deg,#16213e 0%,#0f3460 100%)}

  /* ── Welcome ── */
  .welcome-inner{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:40px 28px;position:relative;overflow:hidden
  }
  .deco-circle{
    position:absolute;border-radius:50%;pointer-events:none
  }
  .deco-circle.c1{width:320px;height:320px;background:rgba(108,99,255,.14);top:-90px;right:-90px}
  .deco-circle.c2{width:220px;height:220px;background:rgba(255,107,157,.1);bottom:40px;left:-70px}

  .logo-box{
    width:100px;height:100px;border-radius:50%;
    background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;
    font-size:52px;margin-bottom:24px;z-index:1
  }
  h1{font-size:clamp(28px,7vw,38px);font-weight:900;text-align:center;margin-bottom:10px;z-index:1}
  .welcome-sub{
    font-size:16px;color:rgba(255,255,255,.72);text-align:center;
    line-height:1.6;margin-bottom:38px;z-index:1;max-width:320px
  }
  .features{
    width:100%;max-width:380px;
    background:rgba(255,255,255,.09);border-radius:16px;
    padding:20px;margin-bottom:34px;z-index:1;display:flex;flex-direction:column;gap:14px
  }
  .feat{display:flex;align-items:center;gap:14px;font-size:15px;font-weight:600}
  .feat span:first-child{font-size:22px;width:30px}

  .btn{
    width:100%;max-width:380px;z-index:1;
    border:none;border-radius:16px;cursor:pointer;overflow:hidden;
    box-shadow:0 6px 24px rgba(255,107,157,.4)
  }
  .btn-inner{
    background:linear-gradient(90deg,#FF6B9D,#C44569);
    padding:18px;font-size:17px;font-weight:800;color:#fff;
    display:block;text-align:center;letter-spacing:.3px
  }
  .btn-inner:hover{filter:brightness(1.08)}
  .disclaimer{color:rgba(255,255,255,.4);font-size:13px;margin-top:14px;z-index:1}

  /* ── Quiz ── */
  .quiz-header{padding:16px 20px 6px}
  .back-btn{
    background:none;border:none;color:rgba(255,255,255,.7);
    font-size:15px;font-weight:600;cursor:pointer;padding:4px 0
  }
  .back-btn:hover{color:#fff}

  .progress-wrap{padding:6px 20px 10px}
  .progress-bar{
    height:6px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden
  }
  .progress-fill{
    height:100%;background:#fff;border-radius:3px;
    transition:width .4s ease
  }
  .progress-label{
    color:rgba(255,255,255,.7);font-size:12px;font-weight:600;
    text-align:center;margin-top:5px
  }

  .quiz-body{flex:1;overflow-y:auto;padding:10px 20px 40px}
  .cat-badge{
    display:inline-block;background:rgba(255,255,255,.15);
    border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;
    letter-spacing:.3px;margin-bottom:16px
  }
  .q-emoji{font-size:52px;display:block;margin-bottom:12px}
  .q-text{font-size:clamp(18px,5vw,22px);font-weight:800;line-height:1.35;margin-bottom:8px}
  .q-sub{color:rgba(255,255,255,.6);font-size:14px;margin-bottom:26px;line-height:1.5}

  /* Options liste */
  .opts-list{display:flex;flex-direction:column;gap:10px}
  .opt{
    display:flex;align-items:center;gap:14px;
    background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.1);
    border-radius:14px;padding:15px 16px;cursor:pointer;
    transition:all .18s ease;position:relative
  }
  .opt:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3)}
  .opt.chosen{background:rgba(255,255,255,.25);border-color:#fff}
  .opt-emoji{font-size:24px;width:32px;flex-shrink:0}
  .opt-label{font-size:15px;font-weight:600;flex:1}
  .check{
    width:20px;height:20px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;
    color:var(--purple);font-size:12px;font-weight:900;
    opacity:0;transition:opacity .15s
  }
  .opt.chosen .check{opacity:1}

  /* Options grille */
  .opts-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:10px
  }
  .opt-grid{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.1);
    border-radius:14px;padding:16px 12px;cursor:pointer;
    transition:all .18s ease;position:relative
  }
  .opt-grid:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3)}
  .opt-grid.chosen{background:rgba(255,255,255,.25);border-color:#fff}
  .opt-grid .opt-emoji{font-size:28px;width:auto}
  .opt-grid .opt-label{font-size:13px;font-weight:600;text-align:center}
  .opt-grid .check{position:absolute;top:8px;right:8px}

  /* ── Résultats ── */
  .results-inner{padding:24px 20px 40px}
  .res-header{text-align:center;padding-bottom:24px}
  .res-emoji{font-size:56px;display:block;margin-bottom:14px}
  .res-title{font-size:clamp(24px,6vw,30px);font-weight:900;margin-bottom:10px}
  .res-sub{color:rgba(255,255,255,.65);font-size:15px;line-height:1.55;max-width:340px;margin:0 auto}

  /* Carte métier */
  .career-card{
    border-radius:20px;margin-bottom:16px;overflow:hidden;
    box-shadow:var(--shadow);cursor:pointer
  }
  .career-inner{padding:20px}
  .card-header{display:flex;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .rank-badge{
    padding:4px 10px;border-radius:12px;
    font-weight:800;font-size:11px;color:#1a1a1a
  }
  .compat-badge{
    background:rgba(255,255,255,.22);padding:4px 10px;
    border-radius:12px;font-weight:700;font-size:12px
  }
  .card-main{display:flex;align-items:center;gap:14px;margin-bottom:10px}
  .card-icon{font-size:44px}
  .card-cat{
    color:rgba(255,255,255,.7);font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px
  }
  .card-job{font-size:clamp(18px,5vw,22px);font-weight:800;line-height:1.2}
  .card-desc{color:rgba(255,255,255,.85);font-size:14px;line-height:1.5;margin-bottom:8px}
  .card-details{
    border-top:1px solid rgba(255,255,255,.2);
    margin-top:12px;padding-top:12px;display:flex;flex-direction:column;gap:10px
  }
  .detail-row{display:flex;gap:10px;align-items:flex-start}
  .detail-icon{font-size:17px;width:24px;flex-shrink:0;padding-top:1px}
  .detail-lbl{color:rgba(255,255,255,.6);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .detail-val{color:#fff;font-size:14px;font-weight:600;margin-top:2px}
  .trend-badge{
    align-self:flex-start;background:rgba(255,255,255,.18);
    padding:6px 12px;border-radius:20px;font-size:13px;font-weight:700;margin-top:4px
  }
  .tap-hint{
    color:rgba(255,255,255,.55);font-size:12px;
    text-align:center;margin-top:10px
  }

  /* Conseil & actions */
  .advice-box{
    background:rgba(255,255,255,.07);border-radius:16px;
    padding:18px;margin-bottom:20px;
    border-left:3px solid #FFD700
  }
  .advice-title{color:#FFD700;font-size:15px;font-weight:800;margin-bottom:8px}
  .advice-text{color:rgba(255,255,255,.72);font-size:14px;line-height:1.55}

  .action-btns{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
  .act-btn{
    border:none;border-radius:14px;overflow:hidden;cursor:pointer;
    box-shadow:0 4px 16px rgba(0,0,0,.3)
  }
  .act-inner{padding:16px;font-size:16px;font-weight:700;color:#fff;display:block;text-align:center}
  .act-inner.purple{background:linear-gradient(90deg,#6C63FF,#3F3D56)}
  .act-inner.pink  {background:linear-gradient(90deg,#FF6B9D,#C44569)}
  .act-inner:hover{filter:brightness(1.1)}
  .home-link{
    display:block;text-align:center;color:rgba(255,255,255,.45);
    font-size:15px;font-weight:600;padding:12px;cursor:pointer;
    background:none;border:none;width:100%
  }
  .home-link:hover{color:rgba(255,255,255,.75)}
  .res-footer{color:rgba(255,255,255,.22);font-size:12px;text-align:center;margin-top:8px}

  /* Scrollbar */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
</style>
</head>
<body>

<!-- ═══════════════ ÉCRAN 1 : ACCUEIL ═══════════════ -->
<div id="screen-welcome" class="screen active">
  <div class="welcome-inner">
    <div class="deco-circle c1"></div>
    <div class="deco-circle c2"></div>
    <div class="logo-box">🧭</div>
    <h1>Déclic Métier</h1>
    <p class="welcome-sub">Découvrez les métiers qui vous correspondent vraiment</p>
    <div class="features">
      <div class="feat"><span>❓</span><span>15 questions ciblées</span></div>
      <div class="feat"><span>🔮</span><span>Analyse astro + personnalité</span></div>
      <div class="feat"><span>🎯</span><span>3 propositions de carrière</span></div>
    </div>
    <button class="btn" onclick="startQuiz()">
      <span class="btn-inner">Commencer le test &nbsp;→</span>
    </button>
    <p class="disclaimer">Gratuit · 3 minutes · Résultats instantanés</p>
  </div>
</div>

<!-- ═══════════════ ÉCRAN 2 : QUIZ ═══════════════ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goBack()">← Retour</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    <p class="progress-label" id="pLabel">1 / 15</p>
  </div>
  <div class="quiz-body" id="quiz-body"></div>
</div>

<!-- ═══════════════ ÉCRAN 3 : RÉSULTATS ═══════════════ -->
<div id="screen-results" class="screen">
  <div class="results-inner" id="results-inner"></div>
</div>

<script>

const QUESTIONS = [

/* ══════════════════════════════════════════════════
   ÉTAT
══════════════════════════════════════════════════ */
let currentQ = 0;
let answers  = [];
let chosen   = null;

/* ══════════════════════════════════════════════════
   NAVIGATION ÉCRANS
══════════════════════════════════════════════════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}

/* ══════════════════════════════════════════════════
   QUIZ
══════════════════════════════════════════════════ */
function startQuiz(){
  currentQ=0; answers=[]; chosen=null;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion(){
  const q = QUESTIONS[currentQ];
  chosen = null;

  // gradient de fond dynamique
  const g = CAT_GRADIENTS[q.cat] || '#6C63FF,#3F3D56';
  document.getElementById('screen-quiz').style.background =
    `linear-gradient(160deg,${g.split(',')[0]} 0%,#1a1a2e 100%)`;

  // progress
  const pct = ((currentQ+1)/QUESTIONS.length*100).toFixed(0);
  document.getElementById('pFill').style.width = pct+'%';
  document.getElementById('pLabel').textContent = `${currentQ+1} / ${QUESTIONS.length}`;

  // corps
  const body = document.getElementById('quiz-body');
  body.innerHTML = `
    <div class="cat-badge">${CAT_LABELS[q.cat]}</div>
    <span class="q-emoji">${q.emoji}</span>
    <p class="q-text">${q.q}</p>
    <p class="q-sub">${q.sub}</p>
    <div class="${q.type==='grid'?'opts-grid':'opts-list'}" id="opts"></div>
  `;

  const container = document.getElementById('opts');
  q.opts.forEach((opt,i)=>{
    const el = document.createElement('div');
    el.className = q.type==='grid' ? 'opt-grid' : 'opt';
    el.id = 'opt-'+i;
    el.innerHTML = q.type==='grid'
      ? `<span class="opt-emoji">${opt.e}</span>
         <span class="opt-label">${opt.l}</span>
         <div class="check">✓</div>`
      : `<span class="opt-emoji">${opt.e}</span>
         <span class="opt-label">${opt.l}</span>
         <div class="check">✓</div>`;
    el.onclick = ()=>selectOption(opt, i, q.type);
    container.appendChild(el);
  });
}

function selectOption(opt, idx, type){
  // marquer la sélection
  document.querySelectorAll(type==='grid'?'.opt-grid':'.opt')
    .forEach(el=>el.classList.remove('chosen'));
  document.getElementById('opt-'+idx).classList.add('chosen');
  chosen = opt;

  // pause visuelle puis suivant
  setTimeout(()=>{
    answers.push(opt);
    if(currentQ < QUESTIONS.length-1){
      currentQ++;
      renderQuestion();
    } else {
      showResults();
    }
  }, 350);
}

function goBack(){
  if(currentQ===0){ showScreen('welcome'); return; }
  answers.pop();
  currentQ--;
  renderQuestion();
}

/* ══════════════════════════════════════════════════
   ALGORITHME
══════════════════════════════════════════════════ */
function computeScores(){
  const totals={};
  answers.forEach(a=>{
    if(!a||!a.s) return;
    Object.entries(a.s).forEach(([cat,pts])=>{ totals[cat]=(totals[cat]||0)+pts; });
  });
  return totals;
}

function getTopCareers(n=3){
  const scores = computeScores();
  const max = Math.max(...Object.values(scores));
  return Object.entries(scores)
    .sort(([,a],[,b])=>b-a)
    .slice(0,n)
    .map(([cat,score])=>{
      const data = CAREERS[cat];
      if(!data) return null;
      const job = data.jobs[Math.floor(Math.random()*data.jobs.length)];
      return { cat, score, compat: max>0?Math.round(score/max*100):0, ...data, job };
    }).filter(Boolean);
}

function toggleCard(detailId, hintId){
  const d = document.getElementById(detailId);
  const h = document.getElementById(hintId);
  const open = d.style.display==='block';
  d.style.display = open?'none':'block';
  h.textContent   = open?'▼ Voir les détails':'▲ Réduire';
}

async function shareResults(titles){
  const text = `J'ai découvert mon orientation idéale avec Déclic Métier : ${titles[0]} ! Essaie pour trouver la tienne.`;
  if(navigator.share){
    try{ await navigator.share({title:'Déclic Métier', text}); } catch(_){}
  } else {
    await navigator.clipboard.writeText(text).catch(()=>{});
    alert('Résultats copiés dans le presse-papier !');
  }
}
